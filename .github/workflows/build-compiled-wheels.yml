name: Build Compiled Wheels

# Manual build-only diagnostics. The tag-gated release workflow owns aggregation and
# publication so an sdist and platform wheels can never race through separate publishers.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install cibuildwheel setuptools wheel cython

      - name: Build wheels
        env:
          # Match requires-python/classifiers exactly: every supported interpreter gets
          # an installable wheel on Linux, Windows, and both mainstream macOS arches.
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_BEFORE_BUILD: >-
            python -m pip install "cython>=3.0"
            "setuptools>=83; python_version >= '3.10'"
            "setuptools>=77; python_version < '3.10'"
          CIBW_BUILD_VERBOSITY: 1
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Store wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compiled-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install release gate
        run: python -m pip install --upgrade "pip>=26.1.2" "setuptools>=83" build twine pip-audit ".[test]"

      - name: Require tag and package version to match
        if: github.event_name == 'push'
        shell: bash
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$actual"
          test "$expected" = "$actual"

      - name: Full release gate
        run: |
          ruff check .
          python -m pytest tests/ -q
          python -m eval.harness --dataset eval/datasets/sample.jsonl --k 5
          python -m eval.harness --dataset eval/datasets/codemem.jsonl --k 5
          python -m eval.ablation
          python -m pip_audit --local

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    # Manual dispatch is intentionally build/check-only. Publication requires a pushed
    # semver tag, whose value was matched to pyproject.toml in the build job above.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    name: Publish GitHub Release
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists; nothing to publish."
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Engraphis ${GITHUB_REF_NAME#v}" \
              --latest
          fi
